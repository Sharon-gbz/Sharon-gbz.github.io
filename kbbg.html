<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万盛公司数据看板（江津南川綦江）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 50%, #e3f2fd 100%);
            min-height: 100vh;
            color: #333;
        }
        
        /* 头部导航 */
        .header {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 50%, #1e88e5 100%);
            color: white;
            padding: 28px 40px;
            box-shadow: 0 4px 20px rgba(21, 101, 192, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 26px; margin-bottom: 20px; font-weight: 500; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; }
        .header h1::before { content: '📊'; font-size: 28px; }
        .region-tabs { display: flex; gap: 12px; }
        .region-tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .region-tab:hover { background: rgba(255,255,255,0.25); transform: translateY(-2px); }
        .region-tab.active { background: white; color: #1565c0; border-color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .container { padding: 30px 40px; max-width: 1600px; margin: 0 auto; }
        
        /* KPI卡片区 */
        .kpi-section { margin-bottom: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        .kpi-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fcff 100%);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(25, 118, 210, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(25, 118, 210, 0.08);
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #42a5f5, #1976d2, #1565c0);
        }
        .kpi-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 16px 48px rgba(25, 118, 210, 0.18); }
        .kpi-icon { 
            width: 60px; 
            height: 60px; 
            margin: 0 auto 14px; 
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 26px;
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.15);
        }
        .kpi-title { font-size: 13px; color: #607d8b; margin-bottom: 8px; font-weight: 500; }
        .kpi-value { font-size: 28px; font-weight: 700; color: #1565c0; margin-bottom: 4px; background: linear-gradient(135deg, #1565c0, #1976d2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .kpi-unit { font-size: 11px; color: #90a4ae; }
        
        /* 图表区 */
        .charts { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; margin-bottom: 30px; }
        .chart-box { 
            background: linear-gradient(145deg, #ffffff 0%, #f8fcff 100%); 
            border-radius: 24px; 
            padding: 28px; 
            box-shadow: 0 10px 40px rgba(25, 118, 210, 0.1); 
            border: 1px solid rgba(25, 118, 210, 0.08);
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e3f2fd;
        }
        .chart-title { font-size: 17px; font-weight: 600; color: #1565c0; display: flex; align-items: center; gap: 10px; }
        .chart-title::before { content: '📈'; }
        .chart-container { position: relative; height: 300px; }
        .bar-chart-container { height: 380px; }
        
        /* 分类切换按钮 */
        .category-selector { display: flex; gap: 12px; margin-bottom: 24px; }
        .category-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: none;
            border-radius: 25px;
            color: #1565c0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.1);
        }
        .category-btn:hover { background: linear-gradient(135deg, #bbdefb 0%, #90caf9 100%); transform: translateY(-2px); }
        .category-btn.active { background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%); color: white; box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3); }
        
        /* 明细区 */
        .detail-area { 
            background: linear-gradient(145deg, #ffffff 0%, #f8fcff 100%); 
            border-radius: 24px; 
            padding: 28px; 
            box-shadow: 0 10px 40px rgba(25, 118, 210, 0.1); 
            border: 1px solid rgba(25, 118, 210, 0.08);
        }
        .detail-tabs { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 3px solid #e3f2fd; padding-bottom: 16px; }
        .detail-tab { 
            padding: 12px 28px; 
            background: #f5f9ff;
            border: none; 
            border-radius: 12px 12px 0 0;
            color: #546e7a; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -19px;
        }
        .detail-tab:hover { background: #e3f2fd; color: #1565c0; }
        .detail-tab.active { background: #1565c0; color: white; border-bottom-color: #1565c0; }
        .detail-section { display: none; }
        .detail-section.active { display: block; }
        
        /* 筛选区 */
        .filter-bar { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f5fe 100%);
            border-radius: 16px;
            border: 1px solid #b3d7fc;
        }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-label { font-size: 13px; color: #546e7a; font-weight: 500; }
        .filter-select, .filter-input {
            padding: 10px 16px;
            border: 2px solid #b3d7fc;
            border-radius: 10px;
            font-size: 13px;
            background: white;
            color: #333;
            outline: none;
            transition: all 0.3s;
        }
        .filter-select:focus, .filter-input:focus { border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.1); }
        .filter-input { width: 220px; }
        
        /* 表格 */
        .table-wrapper { 
            border-radius: 16px; 
            border: 1px solid #b3d7fc; 
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(25, 118, 210, 0.08);
        }
        .table-container { max-height: 480px; overflow-y: auto; }
        .table-container::-webkit-scrollbar { width: 10px; }
        .table-container::-webkit-scrollbar-track { background: #e3f2fd; border-radius: 5px; }
        .table-container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #90caf9, #64b5f6); border-radius: 5px; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .detail-table thead { position: sticky; top: 0; z-index: 10; }
        .detail-table th {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%);
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
            position: relative;
        }
        .detail-table th:hover { background: linear-gradient(135deg, #1976d2 0%, #1e88e5 100%); }
        .th-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .sort-icon {
            font-size: 10px;
            opacity: 0.4;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .detail-table th:hover .sort-icon { opacity: 0.8; }
        .detail-table th.sort-asc .sort-icon { opacity: 1; color: #ffeb3b; }
        .detail-table th.sort-desc .sort-icon { opacity: 1; color: #ffeb3b; }
        .detail-table td { padding: 12px 8px; border-bottom: 1px solid #e3f2fd; color: #333; }
        .detail-table tbody tr { transition: all 0.2s; }
        .detail-table tbody tr:hover { background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%); }
        
        /* 分类标签 */
        .category-tag { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .category-tag.brand { background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: #1565c0; }
        .category-tag.commercial { background: linear-gradient(135deg, #b2ebf2, #80deea); color: #00838f; }
        .category-tag.agent { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); color: #2e7d32; }
        
        /* 数字格式 */
        .num-positive { color: #2e7d32; font-weight: 600; }
        .num-warning { color: #f57c00; font-weight: 600; }
        .num-negative { color: #c62828; font-weight: 600; }
        
        /* 高亮数字 */
        .highlight-num {
            background: linear-gradient(135deg, #1976d2, #1565c0);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
            min-width: 40px;
            text-align: center;
        }
        
        /* 分页 */
        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f5f9ff; border-radius: 12px; }
        .pagination-info { font-size: 13px; color: #546e7a; }
        .pagination-buttons { display: flex; gap: 10px; align-items: center; }
        .pagination-btn { 
            padding: 8px 18px; 
            background: white; 
            border: 2px solid #b3d7fc; 
            border-radius: 10px; 
            color: #1565c0; 
            cursor: pointer; 
            font-size: 13px; 
            transition: all 0.3s;
        }
        .pagination-btn:hover:not(:disabled) { background: #1565c0; color: white; border-color: #1565c0; }
        .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* 搜索区 */
        .search-section { margin-bottom: 24px; }
        .search-container {
            position: relative;
            max-width: 500px;
            background: linear-gradient(135deg, #f5f9ff 0%, #e8f5fe 100%);
            border-radius: 16px;
            padding: 6px;
            border: 2px solid #b3d7fc;
        }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-icon {
            position: absolute;
            left: 16px;
            font-size: 20px;
            color: #90caf9;
        }
        .search-box input { 
            width: 100%;
            padding: 14px 60px 14px 48px; 
            border: none; 
            background: transparent;
            font-size: 15px; 
            outline: none;
        }
        .clear-btn { 
            position: absolute; 
            right: 50px; 
            background: #ffebee; 
            color: #e53935; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 12px;
            display: none;
        }
        .clear-btn.show { display: block; }
        .clear-all-btn { 
            position: absolute; 
            right: 14px; 
            background: none; 
            border: none; 
            color: #bdbdbd; 
            cursor: pointer; 
            font-size: 22px;
            padding: 0;
        }
        .clear-all-btn:hover { color: #757575; }
        .search-dropdown { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            right: 0; 
            background: white; 
            border: 2px solid #b3d7fc; 
            border-radius: 12px; 
            max-height: 300px; 
            overflow-y: auto; 
            z-index: 50; 
            display: none; 
            box-shadow: 0 10px 30px rgba(25, 118, 210, 0.2); 
            margin-top: 8px;
        }
        .search-dropdown.show { display: block; }
        .search-item { 
            padding: 14px 18px; 
            cursor: pointer; 
            border-bottom: 1px solid #e3f2fd; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.2s;
        }
        .search-item:hover { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); }
        .search-item:last-child { border-bottom: none; }
        .search-item-name { font-weight: 600; color: #1565c0; }
        .search-item-meta { font-size: 12px; color: #78909c; }
        
        /* 详情信息卡片 */
        .info-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 30px rgba(25, 118, 210, 0.2);
            display: none;
            animation: slideDown 0.3s ease;
        }
        .info-card.show { display: block; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .info-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .info-card-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.15);
        }
        .info-card-title { font-size: 18px; font-weight: 600; color: #0d47a1; }
        .info-card-subtitle { font-size: 13px; color: #546e7a; }
        
        .info-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .info-stat {
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(25, 118, 210, 0.1);
            text-align: center;
            transition: all 0.3s;
        }
        .info-stat:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(25, 118, 210, 0.2); }
        .info-stat-label { font-size: 12px; color: #78909c; margin-bottom: 8px; font-weight: 500; }
        .info-stat-value { font-size: 20px; font-weight: 700; color: #1565c0; }
        .info-stat-unit { font-size: 11px; color: #90a4ae; margin-top: 4px; }
        
        .info-stat-highlight {
            background: linear-gradient(135deg, #1565c0, #1976d2);
            color: white;
        }
        .info-stat-highlight .info-stat-label { color: rgba(255,255,255,0.8); }
        .info-stat-highlight .info-stat-value { color: white; }
        
        .info-stat-success {
            background: linear-gradient(135deg, #2e7d32, #388e3c);
            color: white;
        }
        .info-stat-success .info-stat-label { color: rgba(255,255,255,0.8); }
        .info-stat-success .info-stat-value { color: white; }
        
        .info-stat-warning {
            background: linear-gradient(135deg, #f57c00, #fb8c00);
            color: white;
        }
        .info-stat-warning .info-stat-label { color: rgba(255,255,255,0.8); }
        .info-stat-warning .info-stat-value { color: white; }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .charts { grid-template-columns: 1fr; }
            .info-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>万盛公司数据看板（江津 · 南川 · 綦江）</h1>
        <div class="region-tabs">
            <button class="region-tab active" data-region="全部">🏠 全部区域</button>
            <button class="region-tab" data-region="江津">🏢 江津</button>
            <button class="region-tab" data-region="南川">🏥 南川</button>
            <button class="region-tab" data-region="綦江">🏨 綦江</button>
        </div>
    </div>

    <div class="container">
        <!-- KPI卡片区 -->
        <div class="kpi-section">
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon">🎯</div>
                    <div class="kpi-title">销售目标金额</div>
                    <div class="kpi-value" id="kpi-target">-</div>
                    <div class="kpi-unit">元</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">📈</div>
                    <div class="kpi-title">当前销售金额</div>
                    <div class="kpi-value" id="kpi-sales">-</div>
                    <div class="kpi-unit">元</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">🏆</div>
                    <div class="kpi-title">完成率</div>
                    <div class="kpi-value" id="kpi-rate">-</div>
                    <div class="kpi-unit">%</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">🏥</div>
                    <div class="kpi-title">终端数 / 在销终端</div>
                    <div class="kpi-value" id="kpi-hospitals">-</div>
                    <div class="kpi-unit">个</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">📦</div>
                    <div class="kpi-title">在销产品数</div>
                    <div class="kpi-value" id="kpi-products">-</div>
                    <div class="kpi-unit">个</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon">💰</div>
                    <div class="kpi-title">销售费用</div>
                    <div class="kpi-value" id="kpi-expense">-</div>
                    <div class="kpi-unit">元</div>
                </div>
            </div>
        </div>

        <!-- 图表区 -->
        <div class="charts">
            <div class="chart-box">
                <div class="chart-header">
                    <div class="chart-title">销售类型占比</div>
                </div>
                <div class="chart-container"><canvas id="pieChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-header">
                    <div class="chart-title">分类产品销量 TOP10</div>
                </div>
                <div class="category-selector">
                    <button class="category-btn active" data-cat="品牌品">品牌品</button>
                    <button class="category-btn" data-cat="商销品">商销品</button>
                    <button class="category-btn" data-cat="代理品">代理品</button>
                </div>
                <div class="bar-chart-container"><canvas id="barChart"></canvas></div>
            </div>
        </div>

        <!-- 明细区 -->
        <div class="detail-area">
            <div class="detail-tabs">
                <button class="detail-tab active" data-section="product">📋 产品销售明细</button>
                <button class="detail-tab" data-section="terminal">🏢 终端销售情况</button>
                <button class="detail-tab" data-section="terminalSearch">🔍 终端产品查询</button>
                <button class="detail-tab" data-section="productSearch">🔍 产品终端查询</button>
            </div>

            <!-- 产品销售明细 -->
            <div class="detail-section active" id="section-product">
                <div class="filter-bar">
                    <div class="filter-group">
                        <span class="filter-label">产品分类:</span>
                        <select id="filter-product-category" class="filter-select">
                            <option value="">全部</option>
                            <option value="品牌品">品牌品</option>
                            <option value="商销品">商销品</option>
                            <option value="代理品">代理品</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <span class="filter-label">🔎 医院搜索:</span>
                        <input type="text" id="filter-product-hospital" class="filter-input" placeholder="输入医院名称...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <div class="table-container">
                        <table class="detail-table"><thead id="thead-product"></thead><tbody id="tbody-product"></tbody></table>
                    </div>
                </div>
                <div class="pagination">
                    <div class="pagination-info" id="pagination-product">共 0 条</div>
                    <div class="pagination-buttons">
                        <button class="pagination-btn" id="prev-product">◀ 上一页</button>
                        <span id="page-product">第 1 页</span>
                        <button class="pagination-btn" id="next-product">下一页 ▶</button>
                    </div>
                </div>
            </div>

            <!-- 终端销售情况 -->
            <div class="detail-section" id="section-terminal">
                <div class="filter-bar">
                    <div class="filter-group">
                        <span class="filter-label">🔎 医院搜索:</span>
                        <input type="text" id="filter-terminal-hospital" class="filter-input" placeholder="输入医院名称...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <div class="table-container">
                        <table class="detail-table"><thead id="thead-terminal"></thead><tbody id="tbody-terminal"></tbody></table>
                    </div>
                </div>
                <div class="pagination">
                    <div class="pagination-info" id="pagination-terminal">共 0 条</div>
                    <div class="pagination-buttons">
                        <button class="pagination-btn" id="prev-terminal">◀ 上一页</button>
                        <span id="page-terminal">第 1 页</span>
                        <button class="pagination-btn" id="next-terminal">下一页 ▶</button>
                    </div>
                </div>
            </div>

            <!-- 终端产品查询 -->
            <div class="detail-section" id="section-terminalSearch">

        // 排序表格
        function sortTable(table, colIndex) {
            const config = tableConfig[table];
            const field = config.fields[colIndex];
            const isNumeric = config.numericFields.includes(config.headers[colIndex]);
            
            if (tableState[table].sortField === field) {
                tableState[table].sortDir = tableState[table].sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                tableState[table].sortField = field;
                tableState[table].sortDir = 'asc';
            }
            
            tableState[table].filtered.sort((a, b) => {
                let va = a[field], vb = b[field];
                if (va === null || va === undefined) va = '';
                if (vb === null || vb === undefined) vb = '';
                if (isNumeric) { va = parseFloat(va) || 0; vb = parseFloat(vb) || 0; }
                if (va < vb) return tableState[table].sortDir === 'asc' ? -1 : 1;
                if (va > vb) return tableState[table].sortDir === 'asc' ? 1 : -1;
                return 0;
            });
            
            // 更新排序图标
            document.querySelectorAll('#thead-' + table + ' th').forEach((th, i) => {
                th.classList.remove('sort-asc', 'sort-desc');
                const icon = th.querySelector('.sort-icon');
                if (icon) icon.textContent = '⇅';
                if (i === colIndex) {
                    th.classList.add('sort-' + tableState[table].sortDir);
                    if (icon) icon.textContent = tableState[table].sortDir === 'asc' ? '↑' : '↓';
                }
            });
            renderTable(table);
        }

                        const cls = config.headers[i].includes('率') ? getRateClass(val) : '';
                        const formatted = config.headers[i].includes('率') ? val.toFixed(2) : formatNumber(val);
                        return '<td class="' + cls + '" style="text-align:right;font-weight:500;">' + formatted + '</td>';
                    }
                    
                    return '<td>' + val + '</td>';
                }).join('') + '</tr>';
            }).join('');
            
            const total = state.filtered.length;
            const totalPages = Math.ceil(total / pageSize) || 1;
            document.getElementById('pagination-' + table).textContent = '共 ' + total + ' 条';
            document.getElementById('page-' + table).textContent = '第 ' + state.page + ' / ' + totalPages + ' 页';
            document.getElementById('prev-' + table).disabled = state.page <= 1;
            document.getElementById('next-' + table).disabled = state.page >= totalPages;
        }
        
        // 分页
        function changePage(table, delta) {
            const state = tableState[table];
            const newPage = state.page + delta;
            const totalPages = Math.ceil(state.filtered.length / pageSize) || 1;
            if (newPage >= 1 && newPage <= totalPages) {
                state.page = newPage;
                renderTable(table);
            }
        }
        
        // 终端搜索
        function showTerminalDropdown(query) {
            const dropdown = document.getElementById('dropdown-terminal');
            const list = dashboardData.terminal_list.filter(t => t.name.toLowerCase().includes(query.toLowerCase())).slice(0, 15);
            if (list.length === 0) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = list.map(t => 
                '<div class="search-item" onclick="selectTerminal(\'' + t.name.replace(/'/g, "\'") + '\')">' +
                '<span class="search-item-name">' + t.name + '</span>' +
                '<span class="search-item-meta">' + t.region + ' · ' + t.level + '</span>' +
                '</div>'
            ).join('');
            dropdown.classList.add('show');
        }

            document.getElementById('search-terminal').value = name;
            document.getElementById('dropdown-terminal').classList.remove('show');

                '<div class="info-stat">' +
                '<div class="info-stat-label">🎯 目标销售</div>' +
                '<div class="info-stat-value">' + formatNumber(info.目标金额) + '</div>' +
                '<div class="info-stat-unit">元</div>' +
                '</div>' +
                '<div class="info-stat info-stat-warning">' +
                '<div class="info-stat-label">💰 销售费用</div>' +
                '<div class="info-stat-value">' + formatNumber(info.销售费用) + '</div>' +
                '<div class="info-stat-unit">元</div>' +
                '</div>' +
                '<div class="info-stat">' +
                '<div class="info-stat-label">📊 费用率</div>' +
                '<div class="info-stat-value">' + info.费用率.toFixed(2) + '%</div>' +
                '<div class="info-stat-unit">费用占比</div>' +
                '</div>' +
                '<div class="info-stat">' +
                '<div class="info-stat-label">👤 客户代表</div>' +
                '<div class="info-stat-value" style="font-size:14px;">' + (info.客户代表 || '-') + '</div>' +
                '<div class="info-stat-unit">负责人</div>' +
                '</div>';
            
            card.classList.add('show');
            filterTable('terminalProducts');
        }
        
        function clearTerminal() {
            selectedTerminal = null;
            document.getElementById('search-terminal').value = '';
            document.getElementById('dropdown-terminal').classList.remove('show');
            document.getElementById('clear-terminal-btn').classList.remove('show');
            document.getElementById('terminal-info-card').classList.remove('show');
            tableState.terminalProducts.filtered = [];
            document.getElementById('tbody-terminalProducts').innerHTML = '';
            document.getElementById('pagination-terminalProducts').textContent = '共 0 条';
        }
        
        // 产品搜索
        function showProductDropdown(query) {
            const dropdown = document.getElementById('dropdown-product');
            const list = dashboardData.product_list.filter(t => t.name.toLowerCase().includes(query.toLowerCase())).slice(0, 15);
            if (list.length === 0) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = list.map(t => 
                '<div class="search-item" onclick="selectProduct(\'' + t.name.replace(/'/g, "\'") + '\')">' +
                '<span class="search-item-name">' + t.name + '</span>' +
                '<span class="search-item-meta"><span class="category-tag ' + getCategoryClass(t.category) + '">' + t.category + '</span></span>' +
                '</div>'
            ).join('');
            dropdown.classList.add('show');
        }
        
        function selectProduct(name) {
            selectedProduct = name;
            document.getElementById('search-product').value = name;
            document.getElementById('dropdown-product').classList.remove('show');
            document.getElementById('clear-product-btn').classList.add('show');
            
            const info = dashboardData.product_terminal_list[name];
            const card = document.getElementById('product-info-card');
            
            // 更新产品图标和标题
            document.getElementById('product-icon').textContent = '💊';
            document.getElementById('product-title').textContent = info.产品名称;
            document.getElementById('product-subtitle').innerHTML = '<span class="category-tag ' + getCategoryClass(info.产品分类) + '">' + info.产品分类 + '</span> · ' + (info.规格 || '-');
            
            // 更新统计数据
            document.getElementById('product-info-grid').innerHTML =

                '<div class="info-stat-label">🏆 完成率</div>' +
                '<div class="info-stat-value">' + info.达成率.toFixed(2) + '%</div>' +
                '<div class="info-stat-unit">达成目标</div>' +

                '<div class="info-stat info-stat-highlight">' +
                '<div class="info-stat-label">🏥 在销终端数</div>' +

                '<div class="info-stat-label">💵 累计销售</div>' +
                '<div class="info-stat-value">' + formatNumber(info.累计销售) + '</div>' +
                '<div class="info-stat-unit">元</div>' +
                '</div>' +
                '<div class="info-stat">' +
                '<div class="info-stat-label">🎯 目标销量</div>' +
                '<div class="info-stat-value">' + formatNumber(info.目标销量) + '</div>' +
                '<div class="info-stat-unit">元</div>' +
                '</div>' +
                '<div class="info-stat info-stat-warning">' +
                '<div class="info-stat-label">💰 销售费用</div>' +
                '<div class="info-stat-value">' + formatNumber(info.销售费用) + '</div>' +
                '<div class="info-stat-unit">元</div>' +
                '</div>' +
                '<div class="info-stat">' +
                '<div class="info-stat-label">📊 费用率</div>' +
                '<div class="info-stat-value">' + info.费用率.toFixed(2) + '%</div>' +
                '<div class="info-stat-unit">费用占比</div>' +
                '</div>' +
                '<div class="info-stat">' +
                '<div class="info-stat-label">📋 总勾选量</div>' +
                '<div class="info-stat-value">' + formatNumber(info.总勾选量) + '</div>' +
                '<div class="info-stat-unit">单位</div>' +
                '</div>';
            
            card.classList.add('show');
            filterTable('productTerminals');
        }
        
        function clearProduct() {
            selectedProduct = null;
            document.getElementById('search-product').value = '';
            document.getElementById('dropdown-product').classList.remove('show');
            document.getElementById('clear-product-btn').classList.remove('show');
            document.getElementById('product-info-card').classList.remove('show');
            tableState.productTerminals.filtered = [];
            document.getElementById('tbody-productTerminals').innerHTML = '';
            document.getElementById('pagination-productTerminals').textContent = '共 0 条';
        }
        
        function init() {
            setupTableHeaders();
            
            // 区域切换
            document.querySelectorAll('.region-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentRegion = tab.dataset.region;
                    updateCards(currentRegion);
                    updatePieChart(currentRegion);
                    updateBarChart(currentRegion, currentCategory);
                    clearTerminal();
                    clearProduct();
                    filterTable('product');
                    filterTable('terminal');
                });
            });
            
            // 分类切换
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.cat;
                    updateBarChart(currentRegion, currentCategory);
                });
            });
            
            // 明细表切换
            document.querySelectorAll('.detail-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.detail-section').forEach(s => s.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('section-' + tab.dataset.section).classList.add('active');
                });
            });
            
            // 筛选事件
            document.getElementById('filter-product-category').addEventListener('change', () => filterTable('product'));
            document.getElementById('filter-product-hospital').addEventListener('input', debounce(() => filterTable('product'), 300));
            document.getElementById('filter-terminal-hospital').addEventListener('input', debounce(() => filterTable('terminal'), 300));
            
            // 终端搜索
            const terminalInput = document.getElementById('search-terminal');
            terminalInput.addEventListener('input', debounce(function() { 
                if (this.value.trim()) showTerminalDropdown(this.value.trim()); 
                else document.getElementById('dropdown-terminal').classList.remove('show'); 
            }, 200));
            terminalInput.addEventListener('focus', function() { if (this.value.trim()) showTerminalDropdown(this.value.trim()); });
            document.getElementById('clear-terminal-btn').addEventListener('click', clearTerminal);
            document.getElementById('clear-all-terminal-btn').addEventListener('click', clearTerminal);
            
            // 产品搜索
            const productInput = document.getElementById('search-product');
            productInput.addEventListener('input', debounce(function() { 
                if (this.value.trim()) showProductDropdown(this.value.trim()); 
                else document.getElementById('dropdown-product').classList.remove('show'); 
            }, 200));
            productInput.addEventListener('focus', function() { if (this.value.trim()) showProductDropdown(this.value.trim()); });
            document.getElementById('clear-product-btn').addEventListener('click', clearProduct);
            document.getElementById('clear-all-product-btn').addEventListener('click', clearProduct);
            
            // 点击其他地方关闭下拉
            document.addEventListener('click', e => {
                if (!e.target.closest('.search-container')) {
                    document.getElementById('dropdown-terminal').classList.remove('show');
                    document.getElementById('dropdown-product').classList.remove('show');
                }
            });
            
            // 分页
            ['product', 'terminal', 'terminalProducts', 'productTerminals'].forEach(t => {
                document.getElementById('prev-' + t).addEventListener('click', () => changePage(t, -1));
                document.getElementById('next-' + t).addEventListener('click', () => changePage(t, 1));
            });
            
            // 初始加载
            updateCards('全部');
            updatePieChart('全部');
            updateBarChart('全部', '品牌品');
            filterTable('product');
            filterTable('terminal');
        }
        
        init();
    </script>
</body>
</html>
