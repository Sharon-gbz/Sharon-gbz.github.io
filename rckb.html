<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重庆-荣昌公司销售看板</title>
<meta property="og:title" content="重庆-荣昌公司销售看板">
<meta property="og:description" content="荣昌公司2026年度销售数据看板，涵盖目标完成率、终端覆盖、产品进度等核心指标">
<meta property="og:image" content="https://sharon-gbz.github.io/logo.png">
<meta property="og:type" content="website">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  :root {
    --primary: #1976D2;
    --primary-light: #2196F3;
    --accent: #1565C0;
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --card-border: rgba(25,118,210,0.15);
    --text: #1a2a3a;
    --text-muted: #5c7a9a;
    --green: #F5670F;
    --orange: #E65100;
    --red: #C62828;
    --yellow: #F9A825;
    --brand-color: #1976D2;
    --comm-color: #0288D1;
    --agent-color: #7B1FA2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
    min-height: 100vh;
    padding: 0;
  }
  .header {
    background: linear-gradient(90deg, #1565C0 0%, #1976D2 50%, #1565C0 100%);
    border-bottom: none;
    padding: 6px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(21,101,192,0.25);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo {
    width: 68px;
    height: 68px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 3px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .time-display { color: rgba(255,255,255,0.85); font-size: 15px; }

  .slicer-bar {
    background: #ffffff;
    border-bottom: 1px solid rgba(25,118,210,0.12);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(21,101,192,0.06);
  }
  .slicer-label { color: var(--text-muted); font-size: 14px; margin-right: 4px; }
  .slicer-btn {
    padding: 8px 20px;
    border: 1px solid rgba(25,118,210,0.3);
    background: transparent;
    color: #1976D2;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    transition: all .2s;
  }
  .slicer-btn:hover { border-color: #1976D2; background: rgba(25,118,210,0.06); }
  .slicer-btn.active {
    background: #1976D2;
    border-color: #1976D2;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(25,118,210,0.3);
  }

  .main { padding: 16px 24px; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: #ffffff;
    border: 1px solid rgba(25,118,210,0.12);
    border-radius: 10px;
    padding: 16px 14px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 1px 6px rgba(21,101,192,0.07);
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(25,118,210,0.15); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 10px 10px 0 0;
  }
  .kpi-card.blue::before { background: linear-gradient(90deg,#1565C0,#42A5F5); }
  .kpi-card.cyan::before { background: linear-gradient(90deg,#0277BD,#29B6F6); }
  .kpi-card.green::before { background: linear-gradient(90deg,#F5670F,#FFA726); }
  .kpi-card.orange::before { background: linear-gradient(90deg,#E65100,#FFA726); }
  .kpi-card.purple::before { background: linear-gradient(90deg,#6A1B9A,#AB47BC); }
  .kpi-card.red::before { background: linear-gradient(90deg,#B71C1C,#EF5350); }
  .kpi-label { font-size: 11px; color: #7a93aa; margin-bottom: 6px; letter-spacing: 0.5px; }
  .kpi-value { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #1a2a3a; }
  .kpi-sub { font-size: 11px; color: #7a93aa; margin-top: 4px; }
  .kpi-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    margin-top: 4px;
  }
  .kpi-tag.good { background: rgba(245,103,15,.1); color: #F5670F; }
  .kpi-tag.warn { background: rgba(230,81,0,.1); color: #E65100; }
  .kpi-tag.bad  { background: rgba(198,40,40,.1); color: #C62828; }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
    align-items: start;
  }
  .chart-row-main { grid-template-columns: 1fr 1fr; }
  .chart-card {
    background: #ffffff;
    border: 1px solid rgba(25,118,210,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(21,101,192,0.07);
  }
  .chart-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a2a3a;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chart-title::before {
    content: '';
    width: 3px;
    height: 14px;
    background: linear-gradient(180deg,#1976D2,#29B6F6);
    border-radius: 2px;
  }
  .chart-body { width: 100%; }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a2a3a;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: linear-gradient(180deg,#1976D2,#29B6F6);
    border-radius: 2px;
  }

  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .filter-bar label { font-size: 12px; color: #5c7a9a; }
  .filter-select {
    background: #f5f8fd;
    border: 1px solid rgba(25,118,210,0.2);
    color: #1a2a3a;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    min-width: 160px;
  }
  .filter-select:focus { outline: none; border-color: #1976D2; }

  .table-wrap {
    overflow-x: auto;
    max-height: 420px;
    overflow-y: auto;
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .data-table th {
    background: #EBF3FB;
    color: #1565C0;
    padding: 8px 10px;
    text-align: center;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 2px solid rgba(25,118,210,0.2);
    white-space: nowrap;
  }
  .data-table td {
    padding: 7px 10px;
    border-bottom: 1px solid #f0f4f8;
    color: #1a2a3a;
    white-space: nowrap;
  }
  .data-table tr:hover td { background: #f0f7ff; }
  .data-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-brand  { background: rgba(25,118,210,.1); color: #1565C0; }
  .badge-comm   { background: rgba(2,136,209,.1); color: #0277BD; }
  .badge-agent  { background: rgba(123,31,162,.1); color: #7B1FA2; }
  .rate-bar {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .rate-track {
    width: 60px;
    height: 5px;
    background: rgba(25,118,210,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .rate-fill { height: 100%; border-radius: 3px; }
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-bottom: 2px solid #e8f0fb;
  }
  .tab-btn {
    padding: 6px 18px;
    background: transparent;
    border: none;
    color: #5c7a9a;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all .2s;
  }
  .tab-btn.active {
    color: #1976D2;
    border-bottom-color: #1976D2;
    font-weight: 600;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .progress-list { display: flex; flex-direction: column; gap: 10px; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .progress-name { color: #1a2a3a; font-weight: 500; }
  .progress-val { color: #5c7a9a; }
  .progress-track {
    height: 8px;
    background: rgba(25,118,210,0.1);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
    position: relative;
  }

  .color-blue { color: #1565C0; }
  .color-link { color: #1976D2; }
  .color-muted { color: #aab; }
  .color-green { color: #F5670F; }
  .color-muted { color: #B0BEC5; }
  .font-bold { font-weight: 700; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #f5f8fd; }
  ::-webkit-scrollbar-thumb { background: rgba(25,118,210,0.25); border-radius: 3px; }

  @media screen and (max-width: 1024px) {
    .main { padding: 12px 16px; }
    .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .kpi-card { padding: 12px 10px; }
    .kpi-value { font-size: 18px; }
    .kpi-label, .kpi-sub { font-size: 10px; }
    .chart-row { grid-template-columns: 1fr 1fr; }
    #coverageChart, #progressChart { height: 300px !important; }
  }
  @media screen and (max-width: 768px) {
    .header { padding: 10px 12px; }
    .header-left { gap: 10px; }
    .header-logo { width: 52px; height: 52px; }
    .header-title { font-size: 21px; letter-spacing: 1px; white-space: nowrap; }
    .time-display { font-size: 11px; }
    .slicer-bar { padding: 12px 14px; gap: 8px; flex-wrap: wrap; }
    .slicer-label { font-size: 13px; width: 100%; margin-bottom: 4px; }
    .slicer-btn { padding: 10px 18px; font-size: 14px; }
    .main { padding: 10px 14px; }
    .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .kpi-card { padding: 10px 8px; }
    .kpi-value { font-size: 18px; }
    .kpi-label { font-size: 9px; }
    .kpi-sub { font-size: 9px; }
    .chart-row { grid-template-columns: 1fr; gap: 10px; }
    .chart-row-main { grid-template-columns: 1fr; }
    .chart-row-main [style*="grid-row"] { grid-row: auto; }
    .chart-row-main .chart-progress { order: 3; }
    .chart-card { padding: 12px; }
    .chart-title { font-size: 12px; }
    #coverageChart, #progressChart { height: 220px !important; }
    #ringCharts { height: auto !important; }
    #progressChart { height: 300px !important; }
    .section-title { font-size: 13px; }
    .filter-bar { gap: 8px; flex-wrap: wrap; }
    .filter-bar label { font-size: 11px; }
    .filter-select { font-size: 11px; padding: 3px 8px; min-width: 100px; }
    .data-table { font-size: 11px; }
    .data-table th, .data-table td { padding: 5px 6px; }
    .table-wrap { max-height: 300px; }
    .tab-btn { padding: 5px 12px; font-size: 12px; }
  }
  @media screen and (max-width: 480px) {
    .header { padding: 8px 8px; }
    .header-left { gap: 8px; }
    .header-logo { width: 46px; height: 46px; }
    .header-title { font-size: 17px; letter-spacing: 0.5px; white-space: nowrap; }
    .slicer-bar { padding: 10px 10px; gap: 8px; }
    .slicer-label { font-size: 12px; }
    .slicer-btn { padding: 10px 16px; font-size: 14px; border-radius: 18px; }
    .main { padding: 8px 10px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .kpi-card { padding: 10px 8px; border-radius: 8px; }
    .kpi-card::before { height: 2px; }
    .kpi-value { font-size: 15px; }
    .kpi-label { font-size: 9px; margin-bottom: 4px; }
    .kpi-sub { font-size: 8px; margin-top: 2px; }
    .kpi-tag { font-size: 9px; }
    .chart-row { gap: 8px; }
    .chart-row-main { grid-template-columns: 1fr; }
    .chart-row-main [style*="grid-row"] { grid-row: auto; }
    .chart-row-main .chart-progress { order: 3; }
    .chart-card { padding: 10px; border-radius: 8px; }
    .chart-title { font-size: 11px; margin-bottom: 8px; }
    #coverageChart, #progressChart { height: 200px !important; }
    #ringCharts { height: auto !important; }
    #progressChart { height: 300px !important; }
    .tab-bar { margin-bottom: 8px; }
    .tab-btn { padding: 4px 10px; font-size: 11px; }
    .filter-bar { gap: 6px; }
    .filter-bar label { font-size: 10px; }
    .filter-select { font-size: 10px; padding: 2px 6px; min-width: 80px; }
    .data-table { font-size: 10px; min-width: 500px; }
    .data-table th, .data-table td { padding: 4px 5px; }
    .data-table th { font-size: 9px; background: #EBF3FB; }
    .table-wrap { max-height: 250px; }
    .badge { font-size: 9px; padding: 1px 5px; }
    .rate-track { width: 40px; }
    .progress-list { gap: 8px; }
    .progress-header { font-size: 11px; }
  }
  @media screen and (max-width: 360px) {
    .header-title { font-size: 15px; }
    .header-logo { width: 42px; height: 42px; }
    .kpi-grid { gap: 6px; }
    .kpi-card { padding: 8px 6px; }
    .kpi-value { font-size: 17px; }
    .kpi-label { font-size: 8px; }
    .kpi-sub { font-size: 7px; }
    .table-wrap { max-height: 200px; }
    .data-table { min-width: 600px; }
  }
  @media screen and (max-height: 500px) and (orientation: landscape) {
    .kpi-grid { grid-template-columns: repeat(6, 1fr); }
    .chart-row { grid-template-columns: 1fr 1fr; }
    .kpi-value { font-size: 16px; }
    .table-wrap { max-height: 180px; }
  }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <div class="header-left">
    <img class="header-logo" src="logo.png" alt="Logo">
    <div>
      <div class="header-title">重庆-荣昌公司销售看板</div>
    </div>
  </div>
  <div class="header-right">
    <div class="time-display" id="timeDisplay"></div>
  </div>
</div>

<!-- 区域切片器 -->
<div class="slicer-bar">
  <span class="slicer-label">区域切片：</span>
  <button class="slicer-btn active" onclick="switchSlice('全部')">全部</button>
  <button class="slicer-btn" onclick="switchSlice('永川')">永川</button>
  <button class="slicer-btn" onclick="switchSlice('荣昌')">荣昌</button>
  <button class="slicer-btn" onclick="switchSlice('大足')">大足</button>
</div>

<div class="main">
  <!-- 第一部分：KPI卡片 -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card blue">
      <div class="kpi-label">销售目标金额</div>
      <div class="kpi-value color-blue" id="kpi-target">—</div>
      <div class="kpi-sub">26年全年目标（无税）</div>
    </div>
    <div class="kpi-card cyan">
      <div class="kpi-label">当前销售金额</div>
      <div class="kpi-value" id="kpi-sales" style="color:#26C6DA">—</div>
      <div class="kpi-sub">26年累计销售（无税）</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-label">目标完成率</div>
      <div class="kpi-value" id="kpi-rate">—</div>
      <div class="kpi-sub" id="kpi-rate-tag"></div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-label">终端数 / 在销终端数</div>
      <div class="kpi-value" id="kpi-terminal">—</div>
      <div class="kpi-sub" id="kpi-terminal-rate"></div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">在销产品数</div>
      <div class="kpi-value" id="kpi-products" style="color:#AB47BC">—</div>
      <div class="kpi-sub">有实际销量的品种数</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">预估全年销售费用</div>
      <div class="kpi-value" id="kpi-fee" style="color:#EF5350">—</div>
      <div class="kpi-sub" id="kpi-fee-rate"></div>
    </div>
  </div>

  <!-- 第一部分：三栏布局 - 左(终端覆盖+产品进度) 右(销售进度TOP10) -->
  <div class="chart-row chart-row-main" style="align-items:stretch;">
    <!-- 上左：终端覆盖情况 -->
    <div class="chart-card">
      <div class="chart-title">终端覆盖情况（按医院等级）</div>
      <div id="coverageChart" class="chart-body" style="height:220px;"></div>
    </div>
    <!-- 上右：销售进度展示 -->
    <div class="chart-card chart-progress" style="grid-row: span 2;">
      <div class="chart-title">销售进度展示 TOP10（按完成金额降序）</div>
      <div id="progressChart" class="chart-body" style="height:100%;"></div>
    </div>
    <!-- 下左：各类产品完成进度 -->
    <div class="chart-card">
      <div class="chart-title">各类产品完成进度</div>
      <div id="ringCharts" class="chart-body" style="position:relative;"></div>
    </div>
  </div>

  <!-- 第四部分：明细表 -->
  <div class="chart-card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('terminal')">终端销售明细</button>
      <button class="tab-btn" onclick="switchTab('product')">产品销售明细</button>
    </div>

    <!-- 终端明细 -->
    <div class="tab-content active" id="tab-terminal">
      <div class="filter-bar">
        <label>筛选终端：</label>
        <input type="text" id="terminalSearch" placeholder="输入终端名称筛选..."
          style="background:#f5f8fd;border:1px solid rgba(25,118,210,0.2);color:#1a2a3a;padding:4px 10px;border-radius:6px;font-size:12px;min-width:160px;"
          oninput="renderTerminalTable()">
        <label>等级：</label>
        <select class="filter-select" id="gradeFilter" style="min-width:80px;" onchange="renderTerminalTable()">
          <option value="">全部</option>
          <option value="三级">三级</option>
          <option value="二级">二级</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="terminalTable">
          <thead>
            <tr>
              <th class="text-center">终端名称</th>
              <th class="text-center">等级</th>
              <th class="text-center">药品销售金额(万元)</th>
              <th class="text-center">负责人</th>
              <th class="text-center">在销产品数</th>
              <th class="text-center">目标金额</th>
              <th class="text-center">完成金额</th>
              <th class="text-center">完成率</th>
            </tr>
          </thead>
          <tbody id="terminalTbody"></tbody>
        </table>
      </div>
      <div id="terminalCount" style="font-size:11px;color:var(--text-muted);margin-top:6px;"></div>


    </div>

    <!-- 产品明细 -->
    <div class="tab-content" id="tab-product">
      <div class="filter-bar">
        <label>筛选产品：</label>
        <input type="text" id="productSearch" placeholder="输入产品名称筛选..."
          style="background:#f5f8fd;border:1px solid rgba(25,118,210,0.2);color:#1a2a3a;padding:4px 10px;border-radius:6px;font-size:12px;min-width:160px;"
          oninput="renderProductTable()">
      </div>
      <div class="table-wrap">
        <table class="data-table" id="productTable">
          <thead>
            <tr>
              <th class="text-center">产品名称</th>
              <th class="text-center">在销终端数</th>
              <th class="text-center">目标金额</th>
              <th class="text-center">完成金额</th>
              <th class="text-center">完成率</th>
            </tr>
          </thead>
          <tbody id="productTbody"></tbody>
        </table>
      </div>
      <div id="productCount" style="font-size:11px;color:var(--text-muted);margin-top:6px;"></div>


    </div>
  </div>

// ======= 工具函数 =======
function fmt(n, digit=0) {
  if (n === null || n === undefined || n === '') return '—';
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  return v.toLocaleString('zh-CN', {minimumFractionDigits: digit, maximumFractionDigits: digit});
}

function fmtWan(n) {
  if (!n && n !== 0) return '—';
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  if (Math.abs(v) >= 10000) return (v / 10000).toFixed(2) + '万';
  return v.toFixed(2);
}

function rateColor(r) {
  if (r >= 80) return '#F5670F';
  if (r >= 50) return '#F9A825';
  if (r >= 20) return '#E65100';
  return '#C62828';
}

function getRateClass(r) {
  if (r >= 80) return 'good';
  if (r >= 40) return 'warn';
  return 'bad';
}

function badgeHtml(type) {
  const map = {
    '品牌品': '<span class="badge badge-brand">品牌品</span>',
    '商销品': '<span class="badge badge-comm">商销品</span>',
    '代理品': '<span class="badge badge-agent">代理品</span>',
  };
  return map[type] || type;
}

function rateBarHtml(rate, color) {
  const w = Math.min(parseFloat(rate) || 0, 100);
  return `<div class="rate-bar"><div class="rate-track"><div class="rate-fill" style="width:${w}%;background:${color}"></div></div><span style="color:${color};font-weight:600">${rate}%</span></div>`;
}

let ringCharts = [];

function renderRings() {
  const container = document.getElementById('ringCharts');
  const d = DASHBOARD_DATA[currentSlice];
  const bt = d.by_type;
  const types = [
    { name: '品牌品', color: '#1976D2', key: '品牌品' },
    { name: '商销品', color: '#0288D1', key: '商销品' },
    { name: '代理品', color: '#7B1FA2', key: '代理品' },
  ];

  // Destroy old charts
  ringCharts.forEach(c => c.dispose());
  ringCharts = [];
  container.innerHTML = '';

  // Pre-compute layout params
  var isMobile = window.innerWidth <= 480;
  var isTablet = window.innerWidth <= 768;
  // Calculate ring size based on container width to prevent overlap
  var containerW = container.clientWidth || 400;
  var isMobile = window.innerWidth <= 480;
  var isTablet = window.innerWidth <= 768;
  var ringRadius, ringCY, chartHeight;
  if (isMobile) {
    ringRadius = [28, 42]; ringCY = 72; chartHeight = 130;
  } else if (isTablet) {
    ringRadius = [38, 56]; ringCY = 92; chartHeight = 170;
  } else {
    // Desktop: ensure 3 rings don't overlap (outer diameter < containerW/3)
    var maxOuterR = Math.floor(containerW / 3 / 2) - 6;
    maxOuterR = Math.min(maxOuterR, 70); // cap at 70px
    maxOuterR = Math.max(maxOuterR, 30); // min 30px
    var innerR = Math.round(maxOuterR * 0.7);
    ringRadius = [innerR, maxOuterR];
    ringCY = Math.round(maxOuterR + 40);
    chartHeight = maxOuterR * 2 + 60;
  }

  // Build all 3 rings inside a single ECharts chart
  const chartDiv = document.createElement('div');
  chartDiv.style.cssText = 'width:100%;height:' + chartHeight + 'px;';
  container.appendChild(chartDiv);

  const chart = echarts.init(chartDiv);
  ringCharts.push(chart);

  const seriesData = types.map((t) => {
    const info = bt[t.key] || { sales: 0, target: 0, completion: 0 };
    const pct = Math.min(info.completion, 100);
    return { ...t, info, pct };
  });

  // Build DOM-based labels below each ring (avoids ECharts graphic vs pie center mismatch)
  var labelGap = isMobile ? 4 : isTablet ? 6 : 8;
  var labelRow = document.createElement('div');
  labelRow.style.cssText = 'display:flex;margin-top:' + labelGap + 'px;';
  seriesData.forEach(function(s) {
    var col = document.createElement('div');
    col.style.cssText = 'flex:1;text-align:center;';
    var nameFontSize = isMobile ? 10 : isTablet ? 11 : 13;
    var infoFontSize = isMobile ? 8 : 10;
    col.innerHTML =
      '<div style="color:' + s.color + ';font-size:' + nameFontSize + 'px;font-weight:700;line-height:1.4;">' + s.name + '</div>' +
      '<div style="color:#7a93aa;font-size:' + infoFontSize + 'px;line-height:1.4;">目标 ' + fmtWan(s.info.target) + '</div>' +
      '<div style="color:#7a93aa;font-size:' + infoFontSize + 'px;line-height:1.4;">完成 ' + fmtWan(s.info.sales) + '</div>';
    labelRow.appendChild(col);
  });
  container.appendChild(labelRow);

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.seriesName === '_ring') return null;
        const idx = p.seriesIndex;
        const s = seriesData[idx];
        if (!s) return null;
        return '<b>' + s.name + '</b><br/>目标：' + fmtWan(s.info.target) + '<br/>完成：' + fmtWan(s.info.sales) + '<br/>完成率：' + s.info.completion + '%';
      },
      confine: true,
    },
    series: seriesData.map(function(s, idx) {
      var totalWidth = 3;
      var singleW = 100 / totalWidth;
      var cx = singleW * (idx + 0.5);
      return {
        type: 'pie',
        radius: ringRadius,
        center: [cx + '%', ringCY],
        startAngle: 90,
        silent: false,
        label: {
          show: true,
          position: 'center',
          formatter: [
            '{a|' + s.info.completion + '%}',
            '{b|完成率}'
          ].join('\n'),
          rich: {
            a: {
              fontSize: isMobile ? 11 : 18,
              fontWeight: 700,
              color: rateColor(s.info.completion),
              lineHeight: isMobile ? 16 : 22,
              align: 'center',
            },
            b: {
              fontSize: isMobile ? 8 : 10,
              color: '#7a93aa',
              lineHeight: isMobile ? 12 : 16,
              align: 'center',
            }
          }
        },
        labelLine: { show: false },
        data: [
          {
            value: s.pct,
            name: '已完成',
            itemStyle: {
              color: {
                type: 'linear',
                x: 0, y: 0, x2: 1, y2: 1,
                colorStops: [
                  { offset: 0, color: s.color },
                  { offset: 1, color: s.color + 'bb' }
                ]
              }
            },
          },
          {
            value: Math.max(100 - s.pct, 0.1),
            name: '未完成',
            itemStyle: { color: '#f0f4f8' },
            label: { show: false },
          }
        ],
        emphasis: { scale: false },
        animationType: 'scale',
        name: s.name,
      };
    })
  });
}

// ======= 终端聚合数据（从明细数据动态计算）=======
function getTerminalAgg() {
  const slice = currentSlice;
  const filtered = DETAIL_DATA.detailRows.filter(r => {
    if (slice === '\u5168\u90E8') return true;
    return r.district === slice;
  });
  const map = {};
  filtered.forEach(r => {
    if (!map[r.terminal]) {
      map[r.terminal] = { terminal: r.terminal, district: r.district, grade: r.grade, totalSales: 0, totalTarget: 0, activeProducts: 0, totalProducts: 0, dirManager: '', dirSalesScale: 0 };
    }
    const t = map[r.terminal];
    t.totalSales += r.salesAmount;
    t.totalTarget += r.targetAmount;
    t.totalProducts += 1;
    // 在销产品数：有26年目标数据（targetAmount > 0）
    if (r.targetAmount > 0) t.activeProducts += 1;
    // 负责人：优先取目录表的负责经理
    if (r.dirManager) t.dirManager = r.dirManager;
    // 药品销售规模：取目录表数据
    if (r.dirSalesScale > t.dirSalesScale) t.dirSalesScale = r.dirSalesScale;
    if (!t.grade && r.grade) t.grade = r.grade;
  });
  return Object.values(map).map(t => {
    t.completion = t.totalTarget > 0 ? Math.round(t.totalSales / t.totalTarget * 10000) / 100 : 0;
    return t;
  }).sort((a, b) => b.totalSales - a.totalSales);
}

// ======= 产品聚合数据（从明细数据动态计算）=======
function getProductAgg() {
  const slice = currentSlice;
  const filtered = DETAIL_DATA.detailRows.filter(r => {
    if (slice === '\u5168\u90E8') return true;
    return r.district === slice;
  });
  const map = {};
  filtered.forEach(r => {
    if (!r.drugName) return;
    if (!map[r.drugName]) {
      map[r.drugName] = { drugName: r.drugName, productType: r.productType, totalSales: 0, totalTarget: 0, activeTerminals: 0, totalTerminals: 0 };
    }
    const p = map[r.drugName];
    p.totalSales += r.salesAmount;
    p.totalTarget += r.targetAmount;
    p.totalTerminals += 1;
    // 在销终端数：有26年目标数据（targetAmount > 0）
    if (r.targetAmount > 0) p.activeTerminals += 1;
  });
  return Object.values(map).map(p => {
    p.completion = p.totalTarget > 0 ? Math.round(p.totalSales / p.totalTarget * 10000) / 100 : 0;
    return p;
  }).sort((a, b) => b.totalSales - a.totalSales);
}

// ======= 下钻状态管理 =======
const drillState = { terminal: {}, product: {} };

function toggleDrill(type, key) {
  const state = drillState[type];
  if (state[key]) {
    delete state[key];
  } else {
    state[key] = true;
  }
  if (type === 'terminal') renderTerminalTable();
  else renderProductTable();
}

function drillRowStyle(isOpen) {
  return isOpen ? '' : 'display:none;';
}

// ======= 渲染终端表格（行内下钻）=======
function renderTerminalTable() {
  const search = (document.getElementById('terminalSearch').value || '').trim().toLowerCase();
  const grade = document.getElementById('gradeFilter').value;
  let rows = getTerminalAgg().filter(r => {
    if (search && !r.terminal.toLowerCase().includes(search)) return false;
    if (grade && r.grade !== grade) return false;
    return true;

function getTerminalDrillData(terminalName) {
  const slice = currentSlice;
  return DETAIL_DATA.detailRows.filter(r => {
    if (slice !== '\u5168\u90E8' && r.district !== slice) return false;
    return r.terminal === terminalName;
  }).filter(r => r.targetAmount > 0).sort((a, b) => b.targetAmount - a.targetAmount);
}

  });

  tbody.innerHTML = html;
  document.getElementById('productCount').textContent = '\u5171 ' + rows.length + ' \u79CD\u4EA7\u54C1';
}

function getProductDrillData(drugName) {
  const slice = currentSlice;
  return DETAIL_DATA.detailRows.filter(r => {
    if (slice !== '\u5168\u90E8' && r.district !== slice) return false;
    return r.drugName === drugName;
  }).filter(r => r.targetAmount > 0).sort((a, b) => b.targetAmount - a.targetAmount);
}

// ======= Tab 切换 =======
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['terminal','product'][i] === tab);
  });
  document.getElementById('tab-terminal').classList.toggle('active', tab === 'terminal');
  document.getElementById('tab-product').classList.toggle('active', tab === 'product');
}

// ======= 全部渲染 =======
function renderAll() {
  renderKPI();
  renderCoverage();
  renderRings();
  renderProgress();
  renderTerminalTable();
  renderProductTable();
}

// ======= 时间 =======
function updateTime() {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN');
}
setInterval(updateTime, 1000);
updateTime();

// ======= 窗口缩放 =======
window.addEventListener('resize', () => {
  if (coverageChart) coverageChart.resize();
  if (ringCharts.length) { ringCharts.forEach(c => c.dispose()); ringCharts = []; renderRings(); }
  if (progressChart) progressChart.resize();
});

// ======= 初始化 =======
renderAll();
</script>
