<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>瑞丰重点产品规划看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",Arial,sans-serif;background:#F0F4F8;color:#222;font-size:14px}
.header{background:linear-gradient(135deg,#047BA5,#1B8DBB);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;letter-spacing:1px}
.header span{font-size:13px;opacity:.85}
.panel{background:#fff;border-radius:10px;padding:16px;margin:12px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:4px}
.kpi-card{background:#fff;border-radius:8px;padding:14px 16px;border:1px solid #E8EAF0;transition:transform .2s}
.kpi-card.orange{border-left:4px solid #F57C00}
.kpi-card.green{border-left:4px solid #2E7D32}
.kpi-label{font-size:12px;color:#888;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700;color:#047BA5}
.kpi-card.orange .kpi-value{color:#F57C00}
.kpi-card.green .kpi-value{color:#2E7D32}
.kpi-sub{font-size:11px;color:#AAA;margin-top:2px}
.kpi-split{display:flex;justify-content:space-between;margin-top:6px;gap:8px}
.kpi-half{flex:1;text-align:center}
.kpi-half .kpi-label{font-size:11px;color:#888;margin-bottom:2px}
.kpi-half .kpi-value{font-size:16px;font-weight:700}
.kpi-half .kpi-value.orange{color:#F57C00}
.kpi-half .kpi-value.green{color:#2E7D32}
.kpi-half .kpi-suffix{font-size:10px;color:#AAA}
.slicer{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.slicer-label{font-size:12px;color:#888;margin-right:4px}
.slicer-btn{border:1.5px solid #047BA5;background:#fff;color:#047BA5;border-radius:20px;padding:4px 14px;cursor:pointer;font-size:12px;transition:all .2s}
.slicer-btn:hover{background:#E8F4F8}
.slicer-btn.active{background:#047BA5;color:#fff}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.chart{height:260px}
.section-title{font-size:14px;font-weight:600;color:#333;margin:16px 12px 8px;border-left:3px solid #047BA5;padding-left:8px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#047BA5;color:#fff;padding:8px 10px;text-align:center;white-space:nowrap}
.data-table td{padding:7px 10px;text-align:center;border-bottom:1px solid #EEF0F5}
.data-table tr:hover td{background:#F8FBFF}
.total-row td{font-weight:700;background:#F0F7FF!important;border-top:2px solid #B0D4EC}
.matrix-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.matrix-table th{background:#1B8DBB;color:#fff;padding:7px 10px;text-align:center;white-space:nowrap;position:sticky;top:0;z-index:2}
.matrix-table td{padding:6px 10px;border-bottom:1px solid #EEF0F5;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-link{color:#047BA5;text-decoration:none;font-weight:500;cursor:pointer}
.drill-link:hover{text-decoration:underline;color:#035A7A}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;padding:24px;min-width:640px;max-width:90vw;max-height:80vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;color:#047BA5;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #E8F4F8}
.modal-close{float:right;cursor:pointer;font-size:18px;color:#888;background:none;border:none}
.modal-close:hover{color:#333}
.modal-sub{font-size:12px;color:#888;margin-bottom:8px}
.modal-table{width:100%;border-collapse:collapse;font-size:13px}
.modal-table th{background:#1B8DBB;color:#fff;padding:8px 12px;text-align:center}
.modal-table td{padding:7px 12px;text-align:center;border-bottom:1px solid #EEF0F5}
.table-note{font-size:11px;color:#888;padding:4px 12px;margin-bottom:6px}
.table-hint{font-size:12px;color:#888;padding:0 12px 6px}
/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;font-size:13px;color:#555}
.pagination-info{color:#888}
.pagination-controls{display:flex;gap:4px;align-items:center}
.pg-btn{border:1px solid #ddd;background:#fff;color:#555;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:12px;min-width:32px}
.pg-btn:hover{background:#E8F4F8;border-color:#047BA5;color:#047BA5}
.pg-btn.active{background:#047BA5;color:#fff;border-color:#047BA5}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-ellipsis{padding:0 4px;color:#888}
@media(max-width:768px){
  .header{padding:12px 16px;flex-direction:column;align-items:flex-start;gap:4px}
  .header h1{font-size:16px}
  .header span{font-size:11px}
  .charts-row{grid-template-columns:1fr}
  .chart{height:220px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-card{padding:10px 12px}
  .kpi-value{font-size:18px}
  .kpi-label{font-size:11px}
  .kpi-split{flex-direction:column;gap:4px}
  .slicer{padding:10px 12px;gap:6px}
  .slicer-btn{padding:3px 10px;font-size:11px}
  .panel{padding:12px;margin:8px}
  .section-title{margin:12px 8px 6px;font-size:13px}
  .data-table,.matrix-table{font-size:11px}
  .data-table th,.data-table td,.matrix-table th,.matrix-table td{padding:5px 6px}
  .pagination{flex-direction:column;gap:6px;align-items:flex-start}
  .modal-box{min-width:unset;width:95vw;padding:16px}
  .matrix-table{min-width:500px}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .kpi-card{padding:8px 10px}
  .kpi-value{font-size:16px}
  .chart{height:180px}
  .slicer-btn{padding:3px 8px;font-size:10px}
}
</style>
</head>

var curRegion = 'all';
function renderSlicer() {
  var bar = document.getElementById('slicer-bar');
  var btns = [{k:'all',n:'全部'}].concat(REGION_LIST.map(function(r){return {k:r.name,n:r.name};}));
  bar.innerHTML = btns.map(function(b){
    var active = (curRegion==='all' && b.k==='all') || (b.k===curRegion) ? ' active' : '';
    return '<button class="slicer-btn'+active+'" onclick="setRegion(\''+b.k+'\')">'+b.n+'</button>';
  }).join('');
}
function setRegion(r) {
  curRegion = r;
  renderSlicer();
  updateCharts();
  renderTerminalTable();
  renderProductMatrix();
}

// ========== 图表 ==========
var chartRegion, chartProduct;
function initCharts() {
  chartRegion = echarts.init(document.getElementById('chart-region'));
  chartProduct = echarts.init(document.getElementById('chart-product'));
  updateCharts();
}
function updateCharts() {
  var rd = curRegion==='all' ? REGION_LIST : REGION_LIST.filter(function(r){return r.name===curRegion;});
  chartRegion.setOption({
    title: {text:'分区5-12月销售（万元）', left:'center', textStyle:{fontSize:13, fontWeight:600, color:'#333'}},
    tooltip: {trigger:'axis', formatter:function(p){
      var reg = REGION_LIST.find(function(x){return x.name===p[0].name;});
      var fee = reg ? reg.f58 : 0;
      var rate = reg && reg.s58>0 ? (fee/reg.s58*100).toFixed(1) : 0;
      return p[0].name + '<br/>销售: ' + p[0].value + '万<br/>费用: ' + fee + '万<br/>费率: ' + rate + '%';
    }},
    xAxis: {type:'category', data:rd.map(function(r){return r.name;}), axisLabel:{fontSize:11, rotate:20}},
    yAxis: {type:'value', name:'万元', axisLabel:{formatter:'{value}'}},
    series:[{
      type:'bar', name:'销售',
      data:rd.map(function(r){return {value:r.s58, itemStyle:{color:'#047BA5'}};}),
      barMaxWidth:50,
      label:{show:true, position:'top', formatter:'{c}', fontSize:10}
    }],
    grid:{left:50, right:20, top:40, bottom:30}
  });
  chartProduct.setOption({
    title: {text:'产品5-12月销售占比（万元）', left:'center', textStyle:{fontSize:13, fontWeight:600, color:'#333'}},
    tooltip: {trigger:'item', formatter:function(p){
      var item = RANK_DATA.find(function(x){return x.name===p.name;});
      var fee = item ? item.f58 : 0;
      var rate = item && item.s58>0 ? (fee/item.s58*100).toFixed(1) : 0;
      return p.name + '<br/>销售: ' + p.value + '万<br/>费用: ' + fee + '万<br/>费率: ' + rate + '%';
    }},
    series:[{
      type:'pie', radius:['38%','65%'],
      data:RANK_DATA.map(function(d,i){
        var colors=['#C55A11','#047BA5','#2E7D32'];
        return {name:d.name, value:d.s58, itemStyle:{color:colors[i]||'#888'}};
      }),
      label:{formatter:'{b}\n{d}%', fontSize:11},
      labelLine:{show:true}
    }],
    grid:{left:50, right:50, top:40, bottom:30}
  });
}

// ========== 终端明细（分页） ==========
var TERM_PAGE_SIZE = 20;
var termCurPage = 1;
var termData = [];

function renderTerminalTable() {
  termData = curRegion==='all' ? DRILL_DATA : DRILL_DATA.filter(function(r){return r.region===curRegion;});
  // 按终端聚合
  var agg = {};
  termData.forEach(function(d){
    var k = d.hospital;
    if(!agg[k]){
      agg[k]={terminal:d.hospital,region:d.region,s14:0,f14:0,s58:0,f58:0,pc:0};
      PRODUCTS.forEach(function(p){ agg[k][p+'_s58']=0; agg[k][p+'_f58']=0; });
    }
    agg[k].s14+=d.s14; agg[k].f14+=d.f14;
    if(d.s58>0 || d.f58>0){
      agg[k][d.product+'_s58']=(agg[k][d.product+'_s58']||0)+d.s58;
      agg[k][d.product+'_f58']=(agg[k][d.product+'_f58']||0)+d.f58;
      agg[k].pc++;
    }
    agg[k].s58+=d.s58; agg[k].f58+=d.f58;
  });
  termData = Object.values(agg).sort(function(a,b){return b.s58-a.s58;});
  termCurPage = 1;
  document.getElementById('terminal-thead').innerHTML = '<tr><th>#</th><th>终端名称</th><th>区域</th><th>品种</th><th>1-4月销售</th><th>1-4月费用</th><th>1-4月费率</th><th>5-12月销售</th><th>5-12月费用</th><th>5-12月费率</th></tr>';
  document.getElementById('table-note').textContent = '共 '+termData.length+' 条';
  renderTermPage();
  renderTermPager();
}

function renderTermPage() {
  var start = (termCurPage-1)*TERM_PAGE_SIZE;
  var page = termData.slice(start, start+TERM_PAGE_SIZE);
  var html = '';
  page.forEach(function(d,i){
    var r14 = d.s14>0?(d.f14/d.s14*100):0;
    var r58 = d.s58>0?(d.f58/d.s58*100):0;
    var escT = (d.terminal||'').replace(/'/g,"\\'");
    html += '<tr><td>'+(start+i+1)+'</td><td style="text-align:left;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+d.terminal+'">'+d.terminal+'</td><td>'+d.region+'</td><td style="color:#047BA5;font-weight:700;cursor:pointer"><a class="drill-link" href="javascript:void(0)" onclick="showTerminalProducts(\''+escT+'\')">'+d.pc+'</a></td><td>'+(d.s14>0?d.s14.toFixed(2):'—')+'</td><td>'+(d.f14>0?d.f14.toFixed(2):'—')+'</td><td style="color:'+(r14>30?'#c00':'#2E7D32')+'">'+(r14>0?r14.toFixed(1)+'%':'—')+'</td><td style="font-weight:700">'+d.s58.toFixed(2)+'</td><td>'+d.f58.toFixed(2)+'</td><td style="color:'+(r58>30?'#c00':'#2E7D32')+';font-weight:700">'+(r58>0?r58.toFixed(1)+'%':'—')+'</td></tr>';
  });
  document.getElementById('terminal-tbody').innerHTML = html;
}

function renderTermPager() {
  var total = termData.length;
  var pages = Math.ceil(total/TERM_PAGE_SIZE);
  var info = document.getElementById('term-pg-info');
  var ctrl = document.getElementById('term-pg-ctrl2');
  if(!info || !ctrl) return;
  info.textContent = '第 '+termCurPage+' / '+pages+' 页，共 '+total+' 条';
  var html = '<button class="pg-btn" onclick="termPrevPage()" '+(termCurPage<=1?'disabled':'')+'>上一页</button>';
  var start = Math.max(1, termCurPage-2);
  var end = Math.min(pages, termCurPage+2);
  if(start>1){ html+='<button class="pg-btn" onclick="termGoPage(1)">1</button>'; if(start>2) html+='<span class="pg-ellipsis">…</span>'; }
  for(var p=start;p<=end;p++){
    html += '<button class="pg-btn'+(p===termCurPage?' active':'')+'" onclick="termGoPage('+p+')">'+p+'</button>';
  }
  if(end<pages){ if(end<pages-1) html+='<span class="pg-ellipsis">…</span>'; html+='<button class="pg-btn" onclick="termGoPage('+pages+')">'+pages+'</button>'; }
  html += '<button class="pg-btn" onclick="termNextPage()" '+(termCurPage>=pages?'disabled':'')+'>下一页</button>';
  ctrl.innerHTML = html;
}
function termGoPage(p){ termCurPage=p; renderTermPage(); renderTermPager(); }
function termPrevPage(){ if(termCurPage>1){termCurPage--; renderTermPage(); renderTermPager();} }
function termNextPage(){ var pages=Math.ceil(termData.length/TERM_PAGE_SIZE); if(termCurPage<pages){termCurPage++; renderTermPage(); renderTermPager();} }

// ========== 产品矩阵（分页+费用+人员） ==========
var MATRIX_PAGE_SIZE = 20;
var matrixCurPage = 1;

function renderMatrixHeader() {
  var thead = '<tr><th style="min-width:200px">医院名称</th>';
  PRODUCTS.forEach(function(p){
    thead += '<th>'+p+'（5-12月费用）</th><th>负责代表</th>';
  });
  thead += '<th style="background:#F57C00">费用合计</th></tr>';
  document.getElementById('matrix-thead').innerHTML = thead;
}

function renderMatrixPage() {
  var start = (matrixCurPage-1)*MATRIX_PAGE_SIZE;
  var page = hospitalList.slice(start, start+MATRIX_PAGE_SIZE);
  var html = '';
  page.forEach(function(row, idx){
    var rank = start + idx + 1;
    var total = 0;
    var cells = ['<td title="'+row.hospital+'"><span style="color:#888;font-size:11px;margin-right:4px">'+rank+'</span><span style="font-weight:600">'+row.hospital+'</span></td>'];
    PRODUCTS.forEach(function(p){
      var fee = row[p+'_fee'] || 0;
      var rep = row[p+'_rep'] || '';
      total += fee;
      if(fee > 0){
        var escH = row.hospital.replace(/'/g,"\\'");
        cells.push('<td style="font-weight:600;color:#F57C00"><a class="drill-link" href="javascript:void(0)" onclick="showFeeDrill(\''+escH+'\',\''+p+'\')">'+fee.toFixed(2)+'</a></td>');
      } else {
        cells.push('<td style="color:#ddd">—</td>');
      }
      if(rep){
        var escH2 = row.hospital.replace(/'/g,"\\'");
        var escR = rep.replace(/'/g,"\\'");
        cells.push('<td><a class="drill-link" href="javascript:void(0)" onclick="showRepDrill(\''+escH2+'\',\''+escR+'\')">'+rep+'</a></td>');
      } else {
        cells.push('<td style="color:#ddd">—</td>');
      }
    });
    cells.push('<td style="font-weight:700;background:#FFF3E0;color:#E65100">'+total.toFixed(2)+'</td>');
    html += '<tr>'+cells.join('')+'</tr>';
  });
  document.getElementById('matrix-tbody').innerHTML = html;
  document.getElementById('matrix-note').textContent = '共 '+hospitalList.length+' 家医院，按5-12月费用合计降序';
}

function renderMatrixPager() {
  var total = hospitalList.length;
  var pages = Math.ceil(total/MATRIX_PAGE_SIZE);
  var info = document.getElementById('matrix-pg-info');
  var ctrl = document.getElementById('matrix-pg-ctrl2');
  if(!info || !ctrl) return;
  info.textContent = '第 '+matrixCurPage+' / '+pages+' 页，共 '+total+' 家医院';
  var html = '<button class="pg-btn" onclick="matrixPrevPage()" '+(matrixCurPage<=1?'disabled':'')+'>上一页</button>';
  var start = Math.max(1, matrixCurPage-2);
  var end = Math.min(pages, matrixCurPage+2);
  if(start>1){ html+='<button class="pg-btn" onclick="matrixGoPage(1)">1</button>'; if(start>2) html+='<span class="pg-ellipsis">…</span>'; }
  for(var p=start;p<=end;p++){
    html += '<button class="pg-btn'+(p===matrixCurPage?' active':'')+'" onclick="matrixGoPage('+p+')">'+p+'</button>';
  }
  if(end<pages){ if(end<pages-1) html+='<span class="pg-ellipsis">…</span>'; html+='<button class="pg-btn" onclick="matrixGoPage('+pages+')">'+pages+'</button>'; }
  html += '<button class="pg-btn" onclick="matrixNextPage()" '+(matrixCurPage>=pages?'disabled':'')+'>下一页</button>';
  ctrl.innerHTML = html;
}
function matrixGoPage(p){ matrixCurPage=p; renderMatrixPage(); renderMatrixPager(); }
function matrixPrevPage(){ if(matrixCurPage>1){matrixCurPage--; renderMatrixPage(); renderMatrixPager();} }
function matrixNextPage(){ var pages=Math.ceil(hospitalList.length/MATRIX_PAGE_SIZE); if(matrixCurPage<pages){matrixCurPage++; renderMatrixPage(); renderMatrixPager();} }

function renderProductMatrix() {
  // 按当前区域过滤
  var filtered = curRegion === 'all' ? DRILL_DATA : DRILL_DATA.filter(function(d){ return d.region === curRegion; });

  // 重新构建医院-费用-人员聚合
  var hospMap = {};
  filtered.forEach(function(d){
    var h = d.hospital;
    if(!hospMap[h]){
      hospMap[h] = {hospital: h, totalFee: 0};
      PRODUCTS.forEach(function(p){ hospMap[h][p+'_fee'] = 0; hospMap[h][p+'_rep'] = ''; });
    }
    hospMap[h][d.product+'_fee'] = (hospMap[h][d.product+'_fee'] || 0) + (d.f58 || 0);
    hospMap[h].totalFee += (d.f58 || 0);
    if(d.rep && d.rep !== '未找到') hospMap[h][d.product+'_rep'] = d.rep;
  });
  hospitalList = Object.values(hospMap);
  hospitalList.sort(function(a,b){ return b.totalFee - a.totalFee; });

  matrixCurPage = 1;
  renderMatrixHeader();
  renderMatrixPage();
  renderMatrixPager();
}

// ========== 钻取：按费用+产品 ==========
function showFeeDrill(hospital, product) {
  var rows = DRILL_DATA.filter(function(d){ return d.hospital===hospital && d.product===product; });
  if(!rows.length){ alert('无明细数据'); return; }
  showDrillModal(hospital+' — '+product, rows);
}

// ========== 钻取：按人员 ==========
function showRepDrill(hospital, rep) {
  var rows = DRILL_DATA.filter(function(d){ return d.hospital===hospital && d.rep===rep; });
  if(!rows.length){ alert('无明细数据'); return; }
  showDrillModal(hospital+' — '+rep, rows);
}

function showTerminalProducts(hospital) {
  // 从DRILL_DATA中过滤出该终端的所有产品记录
  var rows = DRILL_DATA.filter(function(d){ return d.hospital === hospital; });
  if(!rows.length){ alert('该终端无产品数据'); return; }
  showDrillModal(hospital+' — 产品明细', rows);
}

function showDrillModal(title, rows) {
  var tHtml = '<div class="modal-overlay" onclick="if(event.target===this)this.remove()"><div class="modal-box"><div class="modal-title">'+title+'<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">X</button></div><div class="modal-sub">点击任意区域外关闭弹窗</div><table class="modal-table"><thead><tr><th>产品</th><th>1-4月销售</th><th>1-4月费用</th><th>1-4月费率</th><th>5-12月销售</th><th>5-12月费用</th><th>5-12月费用率</th></tr></thead><tbody>';
  var ts14=0, tf14=0, ts58=0, tf58=0;
  rows.forEach(function(d){
    var r1 = d.s14>0?(d.f14/d.s14*100):0;
    var r2 = d.s58>0?(d.f58/d.s58*100):0;
    ts14+=d.s14; tf14+=d.f14; ts58+=d.s58; tf58+=d.f58;
    tHtml += '<tr><td style="font-weight:600;text-align:left">'+d.product+'</td><td>'+d.s14.toFixed(2)+'</td><td>'+d.f14.toFixed(2)+'</td><td style="color:'+(r1>30?'#c00':'#2E7D32')+'">'+r1.toFixed(1)+'%</td><td style="font-weight:700">'+d.s58.toFixed(2)+'</td><td>'+d.f58.toFixed(2)+'</td><td style="color:'+(r2>30?'#c00':'#2E7D32')+';font-weight:700">'+r2.toFixed(1)+'%</td></tr>';
  });
  var tr1 = ts14>0?(tf14/ts14*100):0;
  var tr2 = ts58>0?(tf58/ts58*100):0;
  tHtml += '<tr style="background:#F0F7FF;font-weight:700"><td>合计</td><td>'+ts14.toFixed(2)+'</td><td>'+tf14.toFixed(2)+'</td><td style="color:'+(tr1>30?'#c00':'#2E7D32')+'">'+tr1.toFixed(1)+'%</td><td>'+ts58.toFixed(2)+'</td><td>'+tf58.toFixed(2)+'</td><td style="color:'+(tr2>30?'#c00':'#2E7D32')+';font-weight:700">'+tr2.toFixed(1)+'%</td></tr></tbody></table></div></div>';
  var old = document.querySelector('.modal-overlay');
  if(old) old.remove();
  document.body.insertAdjacentHTML('beforeend', tHtml);
}

// ========== 启动 ==========
window.addEventListener('load', function(){
  renderKPI();
  renderSlicer();
  initCharts();
  renderTerminalTable();
  renderProductMatrix();
});
window.addEventListener('resize', function(){
  if(chartRegion) chartRegion.resize();
  if(chartProduct) chartProduct.resize();
});
</script>
