<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重庆TOP终端销售看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #0c1a2e 0%, #132744 50%, #0e2035 100%);
    color: #e0e6ed; min-height: 100vh; padding: 24px;
  }
  .dashboard {
    max-width: 1400px; margin: 0 auto;
  }
  .header {
    text-align: center; padding: 20px 0 30px; position: relative;
  }
  .header h1 {
    font-size: 32px; font-weight: 700; letter-spacing: 4px;
    background: linear-gradient(90deg, #5ce0d8, #4facfe, #00f2fe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(79,172,254,0.3);
  }
  .header .sub {
    font-size: 13px; color: #6b8299; margin-top: 6px; letter-spacing: 1px;
  }
  .header::after {
    content: ''; display: block; margin: 18px auto 0;
    width: 300px; height: 1px;
    background: linear-gradient(90deg, transparent, #4facfe, transparent);
  }

  /* Section */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 16px; font-weight: 600; color: #7eb8da; margin-bottom: 16px;
    padding-left: 12px; border-left: 3px solid #4facfe;
    letter-spacing: 1px;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }
  .kpi-card {
    background: rgba(20, 45, 75, 0.6); border: 1px solid rgba(79,172,254,0.15);
    border-radius: 12px; padding: 20px; text-align: center;
    backdrop-filter: blur(10px); transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .kpi-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(79,172,254,0.15);
    border-color: rgba(79,172,254,0.35);
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    opacity: 0; transition: opacity 0.2s;
  }
  .kpi-card:hover::before { opacity: 1; }
  .kpi-label {
    font-size: 12px; color: #7b9bb8; margin-bottom: 10px; letter-spacing: 1px;
  }
  .kpi-value {
    font-size: 26px; font-weight: 700; color: #e8f0f8;
    font-variant-numeric: tabular-nums;
  }
  .kpi-unit { font-size: 13px; font-weight: 400; color: #7b9bb8; margin-left: 2px; }
  .kpi-card.accent-green .kpi-value { color: #5ce0d8; }
  .kpi-card.accent-blue .kpi-value { color: #4facfe; }
  .kpi-card.accent-orange .kpi-value { color: #f5a623; }
  .kpi-card.accent-red .kpi-value { color: #ff6b6b; }
  .kpi-card.accent-purple .kpi-value { color: #a78bfa; }
  .kpi-card.accent-cyan .kpi-value { color: #22d3ee; }
  .kpi-card.accent-pink .kpi-value { color: #f472b6; }

  /* Row layout */
  .row-2 { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
  @media (max-width: 900px) {
    .row-2 { grid-template-columns: 1fr; }
  }

  /* Chart container */
  .chart-box {
    background: rgba(20, 45, 75, 0.5); border: 1px solid rgba(79,172,254,0.12);
    border-radius: 12px; padding: 20px;
  }
  .ring-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .ring-card {
    background: rgba(20, 45, 75, 0.4); border: 1px solid rgba(79,172,254,0.1);
    border-radius: 10px; padding: 16px 8px; text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ring-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79,172,254,0.12);
  }
  .ring-chart { width: 100%; height: 180px; }
  .ring-label {
    font-size: 14px; font-weight: 600; margin-top: 4px;
    letter-spacing: 1px;
  }
  .ring-stats {
    font-size: 11px; color: #6b8299; margin-top: 2px; line-height: 1.6;
  }

  /* Terminal Table */
  .table-wrap {
    background: rgba(20, 45, 75, 0.5); border: 1px solid rgba(79,172,254,0.12);
    border-radius: 12px; padding: 20px; overflow-x: auto;
  }
  .terminal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .terminal-table thead th {
    text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600;
    color: #7b9bb8; border-bottom: 1px solid rgba(79,172,254,0.2);
    white-space: nowrap;
  }
  .terminal-table tbody tr {
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid rgba(79,172,254,0.06);
  }
  .terminal-table tbody tr:hover { background: rgba(79,172,254,0.08); }
  .terminal-table tbody td {
    padding: 11px 12px; white-space: nowrap;
  }
  .progress-bar {
    display: inline-block; width: 80px; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.08); vertical-align: middle; margin-right: 6px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; border-radius: 3px; transition: width 0.6s;
  }
  .rate-good { color: #5ce0d8; }
  .rate-mid { color: #f5a623; }
  .rate-low { color: #ff6b6b; }
  .fill-good { background: linear-gradient(90deg, #2dd4bf, #5ce0d8); }
  .fill-mid { background: linear-gradient(90deg, #f59e0b, #f5a623); }
  .fill-low { background: linear-gradient(90deg, #ef4444, #ff6b6b); }

  /* Drill-down */
  .drill-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; backdrop-filter: blur(4px);
    animation: fadeIn 0.2s;
  }
  .drill-overlay.active { display: flex; align-items: center; justify-content: center; }
  .drill-panel {
    background: #132744; border: 1px solid rgba(79,172,254,0.25);
    border-radius: 16px; width: 92%; max-width: 1100px; max-height: 80vh;
    overflow: hidden; display: flex; flex-direction: column;
    animation: slideUp 0.3s;
  }
  .drill-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 24px; border-bottom: 1px solid rgba(79,172,254,0.15);
  }
  .drill-header h3 { font-size: 16px; color: #4facfe; }
  .drill-close {
    background: none; border: 1px solid rgba(79,172,254,0.3); color: #7b9bb8;
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .drill-close:hover { background: rgba(79,172,254,0.15); color: #e0e6ed; }
  .drill-body { padding: 0; overflow-y: auto; }
  .drill-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .drill-table thead th {
    text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600;
    color: #7b9bb8; border-bottom: 1px solid rgba(79,172,254,0.2);
    position: sticky; top: 0; background: #132744; z-index: 1;
    white-space: nowrap;
  }
  .drill-table tbody td {
    padding: 12px 20px; border-bottom: 1px solid rgba(79,172,254,0.06);
  }
  .drill-table tbody tr:hover { background: rgba(79,172,254,0.06); }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .badge-brand { background: rgba(79,172,254,0.15); color: #4facfe; }
  .badge-trade { background: rgba(92,224,216,0.15); color: #5ce0d8; }
  .badge-agent { background: rgba(167,139,250,0.15); color: #a78bfa; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Tab Switcher */
  .tab-switcher {
    display: flex; gap: 4px; background: rgba(20,45,75,0.6);
    border-radius: 10px; padding: 4px; margin-bottom: 16px;
    border: 1px solid rgba(79,172,254,0.1);
  }
  .tab-btn {
    flex: 1; padding: 10px 16px; border: none; border-radius: 8px;
    background: transparent; color: #7b9bb8; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px;
    font-family: inherit;
  }
  .tab-btn:hover { color: #c0d0e0; background: rgba(79,172,254,0.06); }
  .tab-btn.active {
    background: rgba(79,172,254,0.15); color: #4facfe;
    box-shadow: 0 2px 10px rgba(79,172,254,0.1);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>

const totalTarget = salesData.reduce((s, r) => s + r.target_amt, 0);
const totalCurrent = salesData.reduce((s, r) => s + r.cur_amt, 0);
const totalFee = 11602190.34;

const activeTerminals = [...new Set(salesData.map(r => r.t))].length;
const coverageRate = TARGET_TERMINAL_COUNT > 0 ? (activeTerminals / TARGET_TERMINAL_COUNT * 100) : 0;

// By category
const catMap = {};
salesData.forEach(r => {
  if (!catMap[r.cat]) catMap[r.cat] = { target: 0, current: 0 };
  catMap[r.cat].target += r.target_amt;
  catMap[r.cat].current += r.cur_amt;
});

// Terminal summary
const termMap = {};
salesData.forEach(r => {
  if (!termMap[r.t]) termMap[r.t] = { target: 0, current: 0, drugs: new Set(), lv: r.lv, cats: new Set() };
  termMap[r.t].target += r.target_amt;
  termMap[r.t].current += r.cur_amt;
  termMap[r.t].drugs.add(r.drug);
  termMap[r.t].cats.add(r.cat);
});
const termList = Object.entries(termMap)
  .map(([t, v]) => ({ name: t, ...v, drugCount: v.drugs.size, catList: [...v.cats] }))
  .sort((a, b) => b.target - a.target);

      itemStyle: { borderRadius: 6 }
    }]
  });

  document.getElementById(cfg.statsId).innerHTML =
    `目标 ${(d.target / 10000).toFixed(1)}万 · 完成 ${(d.current / 10000).toFixed(1)}万`;
});

// ============ TAB SWITCHER ============
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ============ RENDER TABLE ============
function getRateClass(rate) {
  if (rate >= 25) return 'good';
  if (rate >= 10) return 'mid';
  return 'low';
}
function renderRate(rate) {
  const cls = getRateClass(rate);
  const w = Math.min(rate, 100);
  return `<div class="progress-bar"><div class="fill fill-${cls}" style="width:${w}%"></div></div>
          <span class="rate-${cls}">${rate.toFixed(1)}%</span>`;
}

const tbody = document.getElementById('terminalTbody');
termList.forEach((t, i) => {
  const rate = t.target > 0 ? (t.current / t.target * 100) : 0;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:#7b9bb8">${i + 1}</td>
    <td style="font-weight:600;color:#e0e6ed;max-width:260px;overflow:hidden;text-overflow:ellipsis" title="${t.name}">${t.name}</td>
    <td><span class="badge badge-brand">${t.lv}</span></td>
    <td style="color:#c0d0e0">${t.drugCount}</td>
    <td style="color:#c0d0e0">${(t.target / 10000).toFixed(1)}万</td>
    <td style="color:#c0d0e0">${(t.current / 10000).toFixed(1)}万</td>
    <td>${renderRate(rate)}</td>
  `;
  tr.onclick = () => openDrill(t.name);
  tbody.appendChild(tr);
});

// ============ RENDER PRODUCT TABLE ============
const drugMap = {};
salesData.forEach(r => {
  if (!drugMap[r.drug]) drugMap[r.drug] = { terminals: new Set(), target_amt: 0, cur_amt: 0 };
  drugMap[r.drug].terminals.add(r.t);
  drugMap[r.drug].target_amt += r.target_amt;
  drugMap[r.drug].cur_amt += r.cur_amt;
});
const drugList = Object.entries(drugMap)
  .map(([name, v]) => ({ name, termCount: v.terminals.size, target: v.target_amt, current: v.cur_amt }))
  .sort((a, b) => b.target - a.target);

const productTbody = document.getElementById('productTbody');
drugList.forEach((d, i) => {
  const rate = d.target > 0 ? (d.current / d.target * 100) : 0;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:#7b9bb8">${i + 1}</td>
    <td style="font-weight:600;color:#e0e6ed;max-width:260px;overflow:hidden;text-overflow:ellipsis" title="${d.name}">${d.name}</td>
    <td style="color:#c0d0e0">${d.termCount}</td>
    <td style="color:#c0d0e0">${(d.target / 10000).toFixed(1)}万</td>
    <td style="color:#c0d0e0">${(d.current / 10000).toFixed(1)}万</td>
    <td>${renderRate(rate)}</td>
  `;
  tr.style.cursor = 'pointer';
  tr.onclick = () => openDrugDrill(d.name);
  productTbody.appendChild(tr);
});

// ============ DRILL DOWN ============
function openDrill(terminalName) {
  document.getElementById('drillTitle').textContent = terminalName + ' — 药品明细';
  const drugs = salesData.filter(r => r.t === terminalName);
  const drillTbody = document.getElementById('drillTbody');
  drillTbody.innerHTML = '';
  
  drugs.sort((a, b) => b.target_amt - a.target_amt).forEach(r => {
    const cplRate = r.target_qty > 0 ? (r.cur_qty / r.target_qty * 100) : 0;
    const amtRate = r.target_amt > 0 ? (r.cur_amt / r.target_amt * 100) : 0;
    const feeRate = r.fee != null ? (r.fee * 100).toFixed(1) + '%' : '-';
    const catCls = r.cat === '品牌品' ? 'badge-brand' : r.cat === '商销品' ? 'badge-trade' : 'badge-agent';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:500;color:#e0e6ed">${r.drug}</td>
      <td><span class="badge ${catCls}">${r.cat}</span></td>
      <td style="color:#c0d0e0">${(r.target_amt / 10000).toFixed(2)}万</td>
      <td style="color:#c0d0e0">${(r.cur_amt / 10000).toFixed(2)}万</td>
      <td>${renderRate(amtRate)}</td>
      <td style="color:#c0d0e0">${r.target_qty != null ? r.target_qty.toLocaleString() : '-'}</td>
      <td style="color:#c0d0e0">${r.cur_qty != null ? r.cur_qty.toLocaleString() : '-'}</td>
      <td>${renderRate(cplRate)}</td>
      <td style="color:#c0d0e0">${feeRate}</td>
    `;
    drillTbody.appendChild(tr);
  });

  document.getElementById('drillOverlay').classList.add('active');
}

function closeDrill() {
  document.getElementById('drillOverlay').classList.remove('active');
}
document.getElementById('drillOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDrill();
});

// ============ DRILL DOWN: Drug -> Terminals ============
function openDrugDrill(drugName) {
  document.getElementById('drugDrillTitle').textContent = drugName + ' — 终端明细';
  const rows = salesData.filter(r => r.drug === drugName);
  const drugDrillTbody = document.getElementById('drugDrillTbody');
  drugDrillTbody.innerHTML = '';

  rows.forEach(r => {
    const cplRate = r.target_qty > 0 ? (r.cur_qty / r.target_qty * 100) : 0;
    const amtRate = r.target_amt > 0 ? (r.cur_amt / r.target_amt * 100) : 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:500;color:#e0e6ed;max-width:300px;overflow:hidden;text-overflow:ellipsis" title="${r.t}">${r.t}</td>
      <td><span class="badge badge-brand">${r.lv}</span></td>
      <td style="color:#c0d0e0">${r.target_qty != null ? r.target_qty.toLocaleString() : '-'}</td>
      <td style="color:#c0d0e0">${r.cur_qty != null ? r.cur_qty.toLocaleString() : '-'}</td>
      <td>${renderRate(cplRate)}</td>
      <td>${renderRate(amtRate)}</td>
    `;
    drugDrillTbody.appendChild(tr);
  });

  document.getElementById('drugDrillOverlay').classList.add('active');
}

function closeDrugDrill() {
  document.getElementById('drugDrillOverlay').classList.remove('active');
}
document.getElementById('drugDrillOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDrugDrill();
});

window.addEventListener('resize', () => ringCharts.forEach(c => c.resize()));
</script>
